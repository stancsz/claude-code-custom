litellm_settings:
  drop_params: true

model_list:
  # Claude Code may request Anthropic-native model IDs. Map those to Copilot
  # models that are actually supported.
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-sonnet-4.6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: github_copilot/claude-sonnet-4.5
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-sonnet-4-5-*
    litellm_params:
      model: github_copilot/claude-sonnet-4.5
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-haiku-4-5
    model_info:
      mode: responses
      supports_vision: true
    litellm_params:
      model: github_copilot/gpt-5.2
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-haiku-4-5-*
    model_info:
      mode: responses
      supports_vision: true
    litellm_params:
      model: github_copilot/gpt-5.2
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude-opus-4-5
    litellm_params:
      model: github_copilot/claude-opus-4.5
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: claude*
    litellm_params:
      model: github_copilot/*
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-5.2
    model_info:
      mode: responses
      supports_vision: true
    litellm_params:
      model: github_copilot/gpt-5.2
      drop_params: true
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: gpt-5.2
    model_info:
